services:
  # --- API Server ---
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    mem_limit: 512m
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - NODE_ENV=production
    stop_grace_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - frontend
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # --- Agent Worker (BullMQ consumer) ---
  agent-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["node", "dist/workers/agent-runner.js"]
    mem_limit: 768m
    env_file: .env
    environment:
      - NODE_ENV=production
    stop_grace_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # --- PostgreSQL 16 + pgvector ---
  postgres:
    image: pgvector/pgvector:pg16
    mem_limit: 512m
    shm_size: "256m"
    env_file: .env
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=512MB
        -c work_mem=8MB
        -c maintenance_work_mem=64MB
        -c max_connections=100
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # --- Redis 7 ---
  redis:
    image: redis:7-alpine
    mem_limit: 256m
    command:
      - redis-server
      - --maxmemory
      - "200mb"
      - --maxmemory-policy
      - allkeys-lru
      - --appendonly
      - "yes"
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # --- MinIO (S3-compatible file storage) ---
  minio:
    image: minio/minio
    mem_limit: 256m
    command: server /data --console-address ":9001"
    env_file: .env
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # --- Playwright Microservice (browser automation + noVNC) ---
  playwright-service:
    build:
      context: ./services/playwright
      dockerfile: Dockerfile
    mem_limit: 1536m
    shm_size: "1gb"
    env_file: .env
    ports:
      - "127.0.0.1:6080:6080"
    volumes:
      - playwright_sessions:/app/sessions
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # --- nginx (reverse proxy) ---
  nginx:
    image: nginx:alpine
    mem_limit: 64m
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - frontend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  minio_data:
  playwright_sessions:
